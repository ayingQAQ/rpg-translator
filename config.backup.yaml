# RPG Game Translator Configuration
# ================================

# Translation Settings
translation:
  # Default source and target languages
  source_lang: "auto"  # auto-detect
  target_lang: "zh-CN"  # Chinese Simplified
  
  # Translation engine: "google", "deepl", "baidu", "local"
  engine: "google"
  
  # Batch settings
  batch_size: 50  # Texts per batch
  delay_between_requests: 0.5  # Seconds between API calls
  
  # Retry settings
  max_retries: 3
  retry_delay: 2.0

# API Keys (set in .env file or here)
apis:
  google:
    # Free tier - no key needed
    service_url: "translate.googleapis.com"
  deepl:
    api_key: ""  # Set your DeepL API key
    free_mode: true
  baidu:
    app_id: ""   # Set your Baidu App ID
    secret_key: ""  # Set your Baidu Secret Key

# Local Model Settings
local_model:
  enabled: false
  model_name: "Helsinki-NLP/opus-mt-en-zh"  # Open source translation model
  device: "auto"  # auto, cpu, cuda
  cache_dir: "./models"

# File Processing
processing:
  # Text extraction settings
  min_text_length: 2  # Minimum characters to translate
  max_text_length: 5000  # Maximum characters per text
  
  # Patterns to skip (regex)
  skip_patterns:
    - "^[0-9]+$"  # Pure numbers
    - "^[a-zA-Z0-9_]+$"  # Variable names
    - "^[\\s\\p{P}]+$"  # Only whitespace/punctuation
  
  # Preserve patterns (don't translate content within)
  preserve_patterns:
    - "\\{[^}]+\\}"  # {variables}
    - "<[^>]+>"      # <tags>
    - "\\[[^]]+\\]"  # [placeholders]

# Output Settings
output:
  # Output directory for translated files
  directory: "./output"
  
  # File naming convention
  # {name} = original name, {lang} = target language
  naming: "{name}_{lang}"
  
  # Create backup of original files
  backup: true
  
  # Generate translation log
  log_file: "translation_log.json"

# GUI Settings
gui:
  # Window settings
  remember_geometry: true
  default_width: 1200
  default_height: 800
  
  # Auto-save settings
  auto_save: true
  save_interval: 300  # seconds
  
  # Display settings
  font_size: 10
  theme: "default"  # default, dark
  
  # Game detection
  auto_detect_game: true
  supported_engines:
    - "rpgmv"
    - "rpgvxace" 
    - "wolf"
    - "unity"
    - "renpy"
    - "generic"

# Format-specific settings
formats:
  json:
    encoding: "utf-8"
    indent: 2
    preserve_keys: false  # Don't translate JSON keys
  
  csv:
    encoding: "utf-8"
    delimiter: ","
    text_columns: []  # Auto-detect or specify column indices
  
  xml:
    encoding: "utf-8"
    text_tags: []  # Auto-detect or specify tag names
  
  excel:
    sheet_index: 0  # Sheet to process (0-based)
    text_columns: []  # Auto-detect or specify column letters
  
  binary:
    # Custom binary format definitions
    # Format: "name: offset, length, encoding"
    custom_formats: []
